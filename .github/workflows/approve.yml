name: Approve and Delegate to Copilot

on:
  issue_comment:
    types: [created]
jobs:
  approve:
    # Only run on issue comments (not PR comments) containing exactly "/approve"
    # Only allow repo owner, org members, and explicit collaborators
    if: |
      github.event.issue.pull_request == null &&
      startsWith(github.event.comment.body, '/approve') &&
      (github.event.comment.author_association == 'OWNER' ||
       github.event.comment.author_association == 'MEMBER' ||
       github.event.comment.author_association == 'COLLABORATOR')
    runs-on: ubuntu-latest
    permissions:
      issues: write
    env:
      GH_TOKEN: ${{ github.token }}
      ISSUE: ${{ github.event.issue.number }}
    steps:
      - name: Check not already building
        run: |
          LABELS=$(gh issue view "$ISSUE" --repo "${{ github.repository }}" \
            --json labels --jq '[.labels[].name] | join(",")')
          if echo "$LABELS" | grep -q "status:building"; then
            echo "Issue is already building — skipping."
            exit 0
          fi

      - name: Strip current status labels
        run: |
          LABELS=$(gh issue view "$ISSUE" --repo "${{ github.repository }}" \
            --json labels --jq '.labels[].name' | grep "^status:" || true)
          for label in $LABELS; do
            gh issue edit "$ISSUE" --repo "${{ github.repository }}" \
              --remove-label "$label"
          done

      - name: Set status:approved
        run: |
          gh issue edit "$ISSUE" --repo "${{ github.repository }}" \
            --add-label "status:approved"

      - name: Assign to Copilot coding agent
        run: |
          gh issue edit "$ISSUE" --repo "${{ github.repository }}" \
            --add-assignee "copilot"

      - name: Set status:building
        run: |
          gh issue edit "$ISSUE" --repo "${{ github.repository }}" \
            --add-label "status:building"
